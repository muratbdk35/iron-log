  function ResetPasswordScreen({ onDone, th, t }) {
    const [password, setPassword] = useState("");
    const [password2, setPassword2] = useState("");
    const [msg, setMsg] = useState({ text:"", ok:false });
    const [loading, setLoading] = useState(false);

    async function handleReset() {
      if (!password || password.length < 6) { setMsg({ text:t.atLeast6, ok:false }); return; }
      if (password !== password2) { setMsg({ text:t.passwordsMismatch, ok:false }); return; }
      setLoading(true);
      const { error } = await sb.auth.updateUser({ password });
      if (error) { setMsg({ text:error.message, ok:false }); setLoading(false); return; }
      setMsg({ text:t.resetDone, ok:true });
      setTimeout(() => { window.location.hash = ""; onDone(); }, 1500);
      setLoading(false);
    }

  // ── AUTH ──
  function AuthScreen({ th, t, lang, setLang }) {
    const [mode, setMode] = useState("login");
    const [rememberMe, setRememberMe] = useState(!!localStorage.getItem("ironlog-remember-email"));
    const [username, setUsername] = useState("");
    const [password, setPassword] = useState("");
    const [password2, setPassword2] = useState("");
    const [msg, setMsg] = useState({ text:"", ok:false });
    const [loading, setLoading] = useState(false);

    const [email, setEmail] = useState(localStorage.getItem("ironlog-remember-email")||"");

    async function handleLogin() {
      if (!email || !password) return;
      setLoading(true); setMsg({ text:"", ok:false });
      if (rememberMe) localStorage.setItem("ironlog-remember-email", email);
      else localStorage.removeItem("ironlog-remember-email");
      const { error } = await sb.auth.signInWithPassword({ email, password });
      if (error) setMsg({ text:t.loginError, ok:false });
      setLoading(false);
    }
    async function handleSignup() {
      const u = username.trim();
      if (!u || !email || !password || password.length<6) { setMsg({ text:t.fillAll, ok:false }); return; }
      if (password !== password2) { setMsg({ text:t.passwordsMismatch, ok:false }); return; }
      setLoading(true); setMsg({ text:"", ok:false });
      const { error } = await sb.auth.signUp({ email, password, options:{ data:{ username:u } } });
      if (error) setMsg({ text:error.message, ok:false });
      else setMsg({ text:t.accountCreated, ok:true });
      setLoading(false);
    }
    async function handleForgot() {
      if (!email) return;
      setLoading(true); setMsg({ text:"", ok:false });
      const { error } = await sb.auth.resetPasswordForEmail(email, { redirectTo: window.location.origin });
      if (error) setMsg({ text:error.message, ok:false });
      else setMsg({ text:t.resetSent, ok:true });
      setLoading(false);
    }

    if (mode==="privacy") return <PrivacyPolicyScreen th={th} t={t} lang={lang} onBack={()=>setMode("login")} />;
    if (mode==="terms") return <TermsScreen th={th} t={t} lang={lang} onBack={()=>setMode("login")} />;

    return (
      <div style={{ minHeight:"100vh", display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", padding:24, background:th.bgGrad, position:"relative", overflow:"hidden" }}>
        <BgOrbs th={th} />

          <div style={{ textAlign:"center", marginBottom:32 }}>
            <img src="repmax.png" alt="Repmax" style={{ width:220, display:"block", margin:"0 auto 14px", filter:"drop-shadow(0 0 16px rgba(232,68,48,0.5))" }} />
            <p style={{ color:th.textSec, fontSize:11, letterSpacing:3, fontWeight:500, marginBottom:16 }}>{t.appSub}</p>

              {[["tr","🇹🇷 TR"],["en","🇬🇧 EN"]].map(([val,lb])=>(
                <button key={val} onClick={()=>{ setLang(val); localStorage.setItem("ironlog-lang",val); }} style={{ background:lang===val?th.accent:th.pillBg, border:`1px solid ${lang===val?th.accent:th.divider}`, color:lang===val?"#fff":th.textSec, padding:"5px 16px", cursor:"pointer", borderRadius:20, fontSize:12, fontWeight:600, transition:"all 0.2s", backdropFilter:"blur(8px)", WebkitBackdropFilter:"blur(8px)" }}>{lb}</button>
              ))}
            </div>
          </div>

          {mode==="forgot" ? (
            <GlassCard th={th}>
              <button onClick={()=>setMode("login")} style={{ background:"none", border:"none", color:th.textSec, fontSize:13, cursor:"pointer", marginBottom:20, padding:0 }}>{t.back}</button>
              <h3 style={{ fontWeight:700, fontSize:18, color:th.text, marginBottom:20 }}>{t.forgotPassword}</h3>
              <Label th={th}>{t.email}</Label>
              <GlassInput th={th} type="email" placeholder={t.emailPh} value={email} onChange={e=>setEmail(e.target.value)} onKeyDown={e=>e.key==="Enter"&&handleForgot()} style={{ marginBottom:20 }} />
              {msg.text && <p style={{ color:msg.ok?th.green:th.accent, fontSize:13, marginBottom:16, fontWeight:500 }}>{msg.text}</p>}

  // ── PROGRAM VIEW ──
  function ProgramView({ session, customExList, setCustomExList, userProgram, setUserProgram, th, t }) {
    const [subTab, setSubTab] = useState("programs");
    const [editProgram, setEditProgram] = useState(userProgram || {});
    const [selectedDay, setSelectedDay] = useState("PAZARTESİ");
    const [newExName, setNewExName] = useState("");
    const [saveMsg, setSaveMsg] = useState("");
    const [editingCustomEx, setEditingCustomEx] = useState(null);

    useEffect(() => { setEditProgram(userProgram || {}); }, [userProgram]);

    async function saveProgramToDB(prog) {
      const { error } = await sb.from("user_programs").upsert({ user_id:session.user.id, program:prog }, { onConflict:"user_id" });
      if (!error) { setUserProgram(prog); setSaveMsg(t.savedMsg); setTimeout(()=>setSaveMsg(""), 2000); }
    }

    function addExToDay() {
      const name = newExName.trim();
      if (!name) return;
      const current = editProgram[selectedDay] || [];
      if (current.includes(name)) { setNewExName(""); return; }
      setEditProgram({ ...editProgram, [selectedDay]: [...current, name] });
      setNewExName("");
    }

    function removeExFromDay(day, ex) {
      const updated = { ...editProgram, [day]: (editProgram[day]||[]).filter(e=>e!==ex) };
      if (updated[day].length === 0) delete updated[day];
      setEditProgram(updated);
    }

    async function saveCustomExName() {
      if (!editingCustomEx || !editingCustomEx.newName.trim()) return;
      const newName = editingCustomEx.newName.trim();
      const { error } = await sb.from("custom_exercises").update({ name:newName }).eq("user_id", session.user.id).eq("name", editingCustomEx.name);
      if (!error) { setCustomExList(prev=>prev.map(e=>e.name===editingCustomEx.name?{...e,name:newName}:e)); setEditingCustomEx(null); }
    }

    async function deleteCustomEx(name) {
      await sb.from("custom_exercises").delete().eq("user_id", session.user.id).eq("name", name);
      setCustomExList(prev=>prev.filter(e=>e.name!==name));
    }

    const hasProgram = Object.keys(editProgram).length > 0;

    async function handleUseGuray() {
      setEditProgram(GURAY_PROGRAM);
      await saveProgramToDB(GURAY_PROGRAM);
      setSubTab("mine");
    }

    return (
      <div style={{ maxWidth:520 }}>
        {/* Sub tab switcher */}
        <div style={{ display:"flex", background:th.pillBg, borderRadius:14, padding:3, marginBottom:16, backdropFilter:"blur(8px)", WebkitBackdropFilter:"blur(8px)" }}>

        {subTab==="mine" && customExList.length > 0 && (

              <div key={ex.name} style={{ display:"flex", alignItems:"center", gap:8, padding:"10px 0", borderBottom:`1px solid ${th.divider}` }}>

                    <button onClick={saveCustomExName} style={{ background:th.accent, border:"none", color:"#fff", padding:"8px 14px", cursor:"pointer", borderRadius:10, fontSize:13, fontWeight:600 }}>{t.save}</button>

                    <button onClick={()=>deleteCustomEx(ex.name)} style={{ background:th.pillBg, border:`1px solid ${th.divider}`, color:th.textMuted, padding:"6px 10px", cursor:"pointer", borderRadius:10, fontSize:14, transition:"all 0.2s" }}
                      onMouseEnter={e=>{e.target.style.borderColor=th.accent;e.target.style.color=th.accent;}} onMouseLeave={e=>{e.target.style.borderColor=th.divider;e.target.style.color=th.textMuted;}}>×</button>

  // ── SETTINGS VIEW ──
  function SettingsView({ session, themeName, setThemeName, lang, setLang, th, t }) {
    const [newUsername, setNewUsername] = useState(session.user.user_metadata?.username || "");
    const [usernameMsg, setUsernameMsg] = useState("");
    const [deleteInput, setDeleteInput] = useState("");
    const [deleteLoading, setDeleteLoading] = useState(false);
    const [deleteMsg, setDeleteMsg] = useState("");

    async function handleSaveUsername() {
      const u = newUsername.trim();
      if (!u) return;
      const { error } = await sb.auth.updateUser({ data:{ username:u } });
      if (!error) { setUsernameMsg("✓"); setTimeout(()=>setUsernameMsg(""), 2000); }
    }

    function handleTheme(val) { setThemeName(val); localStorage.setItem("ironlog-theme", val); }
    function handleLang(val) { setLang(val); localStorage.setItem("ironlog-lang", val); }

    async function handleDeleteAccount() {
      if (deleteInput !== t.deleteType) return;
      setDeleteLoading(true);
      const { error } = await sb.rpc("delete_own_account");
      if (error) { setDeleteMsg(error.message); setDeleteLoading(false); return; }
      await sb.auth.signOut();
    }

    const sectionStyle = { marginBottom:14 };

    return (
      <div style={{ maxWidth:520 }}>
        {/* Username */}
        <GlassCard th={th} style={sectionStyle}>
          <h3 style={{ fontWeight:700, fontSize:15, color:th.text, marginBottom:3 }}>{t.changeUsername}</h3>
          <p style={{ color:th.textSec, fontSize:13, marginBottom:14 }}>{t.changeUsernameDesc}</p>
          <div style={{ display:"flex", gap:8 }}>
            <GlassInput th={th} type="text" value={newUsername} onChange={e=>setNewUsername(e.target.value)} onKeyDown={e=>e.key==="Enter"&&handleSaveUsername()} style={{ flex:1 }} />
            <button onClick={handleSaveUsername} className="btn-primary" style={{ background:th.accent, border:"none", color:usernameMsg?"#fff":"#fff", padding:"0 18px", cursor:"pointer", borderRadius:12, fontSize:14, fontWeight:600, boxShadow:`0 4px 12px ${th.accentGlow}`, flexShrink:0 }}>
              {usernameMsg || t.save}
            </button>
          </div>
        </GlassCard>

        {/* Theme */}
        <GlassCard th={th} style={sectionStyle}>
          <h3 style={{ fontWeight:700, fontSize:15, color:th.text, marginBottom:3 }}>{t.theme}</h3>
          <p style={{ color:th.textSec, fontSize:13, marginBottom:14 }}>{t.themeDesc}</p>
          <div style={{ display:"flex", gap:8 }}>
            {[["light","☀️ "+t.light],["dark","🌙 "+t.dark]].map(([val,lb])=>(
              <button key={val} onClick={()=>handleTheme(val)} style={{ flex:1, background:themeName===val?th.accent:th.pillBg, border:`1.5px solid ${themeName===val?th.accent:th.divider}`, color:themeName===val?"#fff":th.text, padding:"12px", cursor:"pointer", borderRadius:12, fontSize:14, fontWeight:600, transition:"all 0.2s", boxShadow:themeName===val?`0 4px 12px ${th.accentGlow}`:"none" }}>{lb}</button>
            ))}
          </div>
        </GlassCard>

        {/* Language */}
        <GlassCard th={th} style={sectionStyle}>
          <h3 style={{ fontWeight:700, fontSize:15, color:th.text, marginBottom:3 }}>{t.language}</h3>
          <p style={{ color:th.textSec, fontSize:13, marginBottom:14 }}>{t.langDesc}</p>
          <div style={{ display:"flex", gap:8 }}>
            {[["tr","🇹🇷 Türkçe"],["en","🇬🇧 English"]].map(([val,lb])=>(
              <button key={val} onClick={()=>handleLang(val)} style={{ flex:1, background:lang===val?th.accent:th.pillBg, border:`1.5px solid ${lang===val?th.accent:th.divider}`, color:lang===val?"#fff":th.text, padding:"12px", cursor:"pointer", borderRadius:12, fontSize:14, fontWeight:600, transition:"all 0.2s", boxShadow:lang===val?`0 4px 12px ${th.accentGlow}`:"none" }}>{lb}</button>
            ))}
          </div>
        </GlassCard>

        {/* Delete Account */}
        <GlassCard th={th} style={{ border:`1px solid ${th.dangerBorder}`, background:th.dangerBg }}>
          <h3 style={{ fontWeight:700, fontSize:15, color:th.danger, marginBottom:3 }}>{t.deleteAccount}</h3>
          <p style={{ color:th.textSec, fontSize:13, marginBottom:14 }}>{t.deleteAccountDesc}</p>
          <p style={{ color:th.textSec, fontSize:13, marginBottom:10 }}>{t.deleteConfirm}</p>
          <div style={{ display:"flex", gap:8 }}>
            <GlassInput th={th} type="text" placeholder={t.deleteType} value={deleteInput} onChange={e=>setDeleteInput(e.target.value)} style={{ flex:1, borderColor: deleteInput===t.deleteType?th.danger:th.inputBorder }} />
            <button onClick={handleDeleteAccount} disabled={deleteLoading||deleteInput!==t.deleteType} style={{ background:deleteInput===t.deleteType?th.danger:th.pillBg, border:"none", color:deleteInput===t.deleteType?"#fff":th.textMuted, padding:"0 16px", cursor:deleteInput===t.deleteType?"pointer":"not-allowed", borderRadius:12, fontSize:13, fontWeight:600, whiteSpace:"nowrap", opacity:deleteLoading?0.7:1, transition:"all 0.2s", flexShrink:0 }}>
              {deleteLoading?t.deleting:t.deleteBtn}
            </button>
          </div>
          {deleteMsg && <p style={{ color:th.danger, fontSize:13, marginTop:10 }}>{deleteMsg}</p>}
        </GlassCard>
      </div>
    );
  }

  // ── MAIN APP ──
  function App() {
    const [session, setSession] = useState(null);
    const [authChecked, setAuthChecked] = useState(false);
    const [isRecovery, setIsRecovery] = useState(false);
    const [logs, setLogs] = useState([]);
    const [customExList, setCustomExList] = useState([]);
    const [userProgram, setUserProgram] = useState(null);
    const [view, setView] = useState("log");
    const [date, setDate] = useState(new Date().toISOString().split("T")[0]);
    const [programDay, setProgramDay] = useState(()=>DATE_TO_DAY[new Date().getDay()]);
    const [exercise, setExercise] = useState("");
    const [newCustomEx, setNewCustomEx] = useState("");
    const [customExDay, setCustomExDay] = useState("PAZARTESİ");
    const [sets, setSets] = useState([{ weight:"", reps:"", rir:"" }]);
    const [savedAnim, setSavedAnim] = useState(false);
    const [overrideDay, setOverrideDay] = useState(false);
    const [expanded, setExpanded] = useState({});
    const [filterEx, setFilterEx] = useState("all");
    const [loading, setLoading] = useState(false);
    const [themeName, setThemeName] = useState(()=>localStorage.getItem("ironlog-theme")||"light");
    const [lang, setLang] = useState(()=>localStorage.getItem("ironlog-lang")||"tr");

    const th = THEMES[themeName];
    const t = LANGS[lang];

    useEffect(() => {
      document.body.style.background = th.bgGrad;
      document.body.style.color = th.text;
    }, [themeName]);

    useEffect(() => {
      sb.auth.getSession().then(({ data: { session } }) => { setSession(session); setAuthChecked(true); });
      const { data: { subscription } } = sb.auth.onAuthStateChange((event, s) => {
        setSession(s);
        if (event === "PASSWORD_RECOVERY") setIsRecovery(true);
      });
      return () => subscription.unsubscribe();
    }, []);

    useEffect(() => {
      if (session) { fetchLogs(); fetchCustomEx(); fetchUserProgram(); }
      else { setLogs([]); setCustomExList([]); setUserProgram(null); }
    }, [session]);

    async function fetchLogs() {
      const { data } = await sb.from("workouts").select("*").order("date",{ascending:false}).order("id",{ascending:true});
      if (data) setLogs(data);
    }
    async function fetchCustomEx() {
      const { data } = await sb.from("custom_exercises").select("*").order("created_at");
      if (data) setCustomExList(data.map(d=>({ name:d.name, day:d.day||"DİĞER" })));
    }
    async function fetchUserProgram() {
      const { data } = await sb.from("user_programs").select("program").eq("user_id",session.user.id).single();
      if (data?.program) setUserProgram(data.program);
    }

    const activeProgram = userProgram || {};

    function addSet() {
      const lastWeight = sets[sets.length-1]?.weight || "";
      setSets([...sets, { weight:lastWeight, reps:"", rir:"" }]);
    }

    async function handleSave() {
      if (!exercise || exercise==="__custom__" || sets.some(s=>!s.weight||!s.reps)) return;
      setLoading(true);
      const { data, error } = await sb.from("workouts").insert({
        user_id:session.user.id, date, exercise,
        sets:sets.map(s=>({ weight:parseFloat(s.weight), reps:parseInt(s.reps), ...(s.rir!==""?{rir:parseInt(s.rir)}:{}) }))
      }).select();
      if (!error && data) {
        setLogs(prev=>[...prev,data[0]].sort((a,b)=>b.date.localeCompare(a.date)||a.id-b.id));
        setSavedAnim(true); setExercise(""); setSets([{weight:"",reps:"",rir:""}]);
        setTimeout(()=>setSavedAnim(false), 2000);
      }
      setLoading(false);
    }

    async function deleteEntry(id) {
      await sb.from("workouts").delete().eq("id",id);
      setLogs(prev=>prev.filter(l=>l.id!==id));
    }

    async function addCustomExercise() {
      const name = newCustomEx.trim();
      if (!name || customExList.some(e=>e.name===name)) { setNewCustomEx(""); setExercise(""); return; }
      const { error } = await sb.from("custom_exercises").insert({ user_id:session.user.id, name, day:customExDay });
      if (!error) { setCustomExList(prev=>[...prev,{ name, day:customExDay }]); setExercise(name); setNewCustomEx(""); }
    }

    const byDate = logs.reduce((acc,l)=>{ if(!acc[l.date])acc[l.date]=[]; acc[l.date].push(l); return acc; }, {});
    const sortedDates = Object.keys(byDate).sort((a,b)=>b.localeCompare(a));
    const allExNames = [...new Set(logs.map(l=>l.exercise))];
    const progressData = allExNames.map(name=>{
      const entries = logs.filter(l=>l.exercise===name).sort((a,b)=>a.date.localeCompare(b.date));
      const bests = entries.map(e=>({ date:e.date, best1RM:Math.max(...e.sets.map(s=>s.weight*(1+s.reps/30))) }));
      return { name, bests };
    });
    const filteredProgress = filterEx==="all"?progressData:progressData.filter(p=>p.name===filterEx);
    const username = session?.user.user_metadata?.username || session?.user.email?.split("@")[0];

    const TABS = [
      ["log", t.save, "💪"],
      ["history", t.history, "📋"],
      ["progress", t.progress, "📈"],
      ["program", t.program, "🗓"],
      ["settings", t.settings, "⚙️"],
    ];

    if (!authChecked) return (
      <div style={{ minHeight:"100vh", display:"flex", alignItems:"center", justifyContent:"center", background:th.bgGrad, position:"relative", overflow:"hidden" }}>
        <BgOrbs th={th} />
        <div style={{ position:"relative", zIndex:1, overflowX:"hidden", width:"100%" }}>
          <img src="repmax.png" alt="Repmax" style={{ width:240, display:"block", margin:"0 auto", filter:"drop-shadow(0 0 16px rgba(232,68,48,0.5))" }} />
        </div>
      </div>
    );
    if (isRecovery) return <ResetPasswordScreen onDone={()=>setIsRecovery(false)} th={th} t={t} />;
    if (!session) return <AuthScreen th={th} t={t} lang={lang} setLang={setLang} />;

    return (
      <div style={{ minHeight:"100vh", background:th.bgGrad, position:"relative", overflow:"hidden" }}>
        <BgOrbs th={th} />
        <div style={{ position:"relative", zIndex:1, overflowX:"hidden", width:"100%" }}>
          {/* Header */}
          <div className="glass" style={{ background:th.headerGlass, borderBottom:`1px solid ${th.headerBorder}`, backdropFilter:"blur(30px)", WebkitBackdropFilter:"blur(30px)", position:"sticky", top:0, zIndex:100 }}>
            <div style={{ maxWidth:720, margin:"0 auto", padding:"0 20px", height:56, display:"flex", alignItems:"center", justifyContent:"space-between" }}>
              <img src="repmax.png" alt="Repmax" style={{ height:26, filter:"drop-shadow(0 0 8px rgba(232,68,48,0.4))" }} />
              <div style={{ display:"flex", alignItems:"center", gap:10 }}>
                <span style={{ color:th.textSec, fontSize:13, fontWeight:500 }}>{username}</span>
                <button onClick={()=>sb.auth.signOut()} style={{ background:th.pillBg, border:`1px solid ${th.divider}`, color:th.textSec, fontSize:12, fontWeight:600, padding:"5px 12px", cursor:"pointer", borderRadius:20, transition:"all 0.2s", backdropFilter:"blur(8px)", WebkitBackdropFilter:"blur(8px)" }}
                  onMouseEnter={e=>{e.target.style.borderColor=th.accent;e.target.style.color=th.accent;}} onMouseLeave={e=>{e.target.style.borderColor=th.divider;e.target.style.color=th.textSec;}}>{t.logout}</button>
              </div>
            </div>

            {/* Tab bar */}
            <div style={{ maxWidth:720, margin:"0 auto", padding:"0 16px", display:"flex" }}>
              {TABS.map(([k,lb])=>(
                <button key={k} onClick={()=>setView(k)} style={{ flex:1, background:"none", border:"none", color:view===k?th.navActive:th.navInactive, fontSize:11, fontWeight:view===k?700:500, padding:"10px 4px 12px", cursor:"pointer", borderBottom:`2px solid ${view===k?th.accent:"transparent"}`, transition:"all 0.2s", marginBottom:-1, letterSpacing:0.2, whiteSpace:"nowrap" }}>
                  {lb}
                </button>
              ))}
            </div>
          </div>

          {/* Content */}
          <div style={{ maxWidth:720, margin:"0 auto", padding:"24px 16px 40px", width:"100%", overflowX:"hidden" }} className="fade-up">

            {/* ── KAYDET ── */}
            {view==="log" && (
              <div style={{ maxWidth:520, width:"100%" }}>
                <GlassCard th={th} style={{ marginBottom:12 }}>
                  <Label th={th}>{t.date}</Label>
                  <input
                    type="date"
                    value={date}
                    onChange={e=>setDate(e.target.value)}
                    style={{
                      display:"block",
                      width:"100%",
                      maxWidth:"100%",
                      boxSizing:"border-box",
                      background:th.inputBg,
                      border:`1.5px solid ${th.inputBorder}`,
                      color:th.text,
                      padding:"11px 14px",
                      fontSize:15,
                      borderRadius:12,
                      outline:"none",
                      WebkitAppearance:"none",
                      appearance:"none",
                      margin:0,
                    }}
                    onFocus={e=>{ e.target.style.borderColor=th.accent; }}
                    onBlur={e=>{ e.target.style.borderColor=th.inputBorder; }}
                  />
                </GlassCard>

                <GlassCard th={th} style={{ marginBottom:12 }}>
                  <Label th={th}>{t.trainingDay}</Label>
                  <div style={{ display:"flex", flexWrap:"wrap", gap:7 }}>
                    {DAYS.filter(d=>d!=="DİĞER").map(d=>{
                      const hasExs = (activeProgram[d]||[]).length>0 || customExList.some(e=>e.day===d);
                      if (!hasExs) return null;
                      const isActive = programDay===d;
                      return (
                        <button key={d} onClick={()=>{ setProgramDay(d); setExercise(""); }} style={{ background:isActive?th.accent:th.pillBg, border:`1px solid ${isActive?th.accent:th.divider}`, color:isActive?"#fff":th.text, padding:"7px 13px", cursor:"pointer", borderRadius:20, fontSize:12, fontWeight:isActive?700:500, transition:"all 0.2s", backdropFilter:"blur(8px)", WebkitBackdropFilter:"blur(8px)", boxShadow:isActive?`0 3px 10px ${th.accentGlow}`:"none" }}>
                          {t.days[d] || d}
                        </button>
                      );
                    })}
                  </div>
                </GlassCard>

                <GlassCard th={th} style={{ marginBottom:12 }}>
                  <Label th={th}>{t.exercise}</Label>
                  <GlassSelect th={th} value={exercise} onChange={e=>setExercise(e.target.value)}>
                    <option value="">{t.selectEx}</option>
                    {(() => {
                      const dayEx = [...(activeProgram[programDay]||[]), ...customExList.filter(e=>e.day===programDay).map(e=>e.name)];
                      const otherDays = DAYS.filter(d=>d!==programDay&&d!=="DİĞER");
                      return <>
                        {dayEx.length>0 && (
                          <optgroup label={`📅 ${t.days[programDay]||programDay} (${t.today})`}>
                            {dayEx.map(ex=><option key={ex} value={ex}>{ex}</option>)}
                          </optgroup>
                        )}
                        {otherDays.map(day=>{
                          const all=[...(activeProgram[day]||[]),...customExList.filter(e=>e.day===day).map(e=>e.name)];
                          if(!all.length) return null;
                          return <optgroup key={day} label={t.days[day]||day}>{all.map(ex=><option key={ex} value={ex}>{ex}</option>)}</optgroup>;
                        })}
                      </>;
                    })()}
                    <option value="__custom__">{t.addNewEx}</option>
                  </GlassSelect>

                  {/* Son seferki göstergesi */}
                  {exercise && exercise !== "__custom__" && (() => {
                    const prev = logs.filter(l=>l.exercise===exercise);
                    if (!prev.length) return null;
                    const last = prev[0];
                    const daysDiff = Math.round((new Date() - new Date(last.date+"T12:00:00"))/(1000*60*60*24));
                    const dayStr = daysDiff===0?(lang==="tr"?"bugün":"today"):daysDiff===1?(lang==="tr"?"dün":"yesterday"):(lang==="tr"?`${daysDiff} gün önce`:`${daysDiff} days ago`);
                    return (
                      <div style={{ marginTop:10, background:th.accentBg, border:`1px solid ${th.accentBorder}`, borderRadius:12, padding:"10px 14px" }}>
                        <p style={{ color:th.textSec, fontSize:11, fontWeight:600, letterSpacing:1, textTransform:"uppercase", marginBottom:6 }}>{lang==="tr"?"Son Antrenman":"Last Session"} · {dayStr}</p>
                        <div style={{ display:"flex", flexWrap:"wrap", gap:5 }}>
                          {last.sets.map((s,i)=>(
                            <span key={i} style={{ background:th.tagBg, border:`1px solid ${th.tagBorder}`, padding:"3px 10px", fontSize:12, borderRadius:20, fontWeight:500, color:th.text }}>
                              <span style={{ color:th.accent, fontWeight:700 }}>{s.weight}</span>
                              <span style={{ color:th.textMuted }}> × </span>
                              <span>{s.reps}</span>
                              {s.rir!=null&&s.rir!==""&&<span style={{ color:th.textMuted }}> RIR{s.rir}</span>}
                            </span>
                          ))}
                        </div>
                      </div>
                    );
                  })()}

                  {exercise==="__custom__" && (
                    <div style={{ marginTop:16 }}>
                      <div style={{ marginBottom:12 }}>
                        <Label th={th}>{t.whichDay}</Label>
                        <GlassSelect th={th} value={customExDay} onChange={e=>setCustomExDay(e.target.value)}>
                          {DAYS.map(d=><option key={d} value={d}>{t.days[d]||d}</option>)}
                        </GlassSelect>
                      </div>
                      <Label th={th}>{t.exName}</Label>
                      <div style={{ display:"flex", gap:8 }}>
                        <GlassInput th={th} type="text" placeholder={t.exNamePh} value={newCustomEx} onChange={e=>setNewCustomEx(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addCustomExercise()} style={{ flex:1 }} />
                        <button onClick={addCustomExercise} className="btn-primary" style={{ background:th.accent, border:"none", color:"#fff", padding:"0 18px", cursor:"pointer", borderRadius:12, fontSize:20, fontWeight:700, boxShadow:`0 4px 12px ${th.accentGlow}`, flexShrink:0 }}>+</button>
                      </div>
                      <p style={{ color:th.textMuted, fontSize:12, marginTop:6 }}>{t.enterOrPlus}</p>
                    </div>
                  )}
                </GlassCard>

                <GlassCard th={th} style={{ marginBottom:16 }}>
                  <Label th={th}>{t.sets}</Label>
                  <div style={{ display:"grid", gridTemplateColumns:"26px 1fr 1fr 72px 22px", gap:6, paddingBottom:10, borderBottom:`1px solid ${th.divider}`, marginBottom:10 }}>
                    {[t.setNum,t.kg,t.reps,t.rir,""].map((h,i)=><span key={i} style={{ color:th.textMuted, fontSize:10, fontWeight:700, textTransform:"uppercase", letterSpacing:0.5 }}>{h}</span>)}
                  </div>
                  {sets.map((s,i)=>(
                    <div key={i} style={{ display:"grid", gridTemplateColumns:"26px 1fr 1fr 72px 22px", gap:6, marginBottom:8, alignItems:"center" }}>
                      <span style={{ color:th.accent, fontWeight:700, fontSize:14 }}>{i+1}</span>
                      <GlassInput th={th} type="number" placeholder="80" value={s.weight} onChange={e=>setSets(sets.map((x,idx)=>idx===i?{...x,weight:e.target.value}:x))} style={{ padding:"9px 10px" }} />
                      <GlassInput th={th} type="number" placeholder="8" value={s.reps} onChange={e=>setSets(sets.map((x,idx)=>idx===i?{...x,reps:e.target.value}:x))} style={{ padding:"9px 10px" }} />
                      <GlassInput th={th} type="number" placeholder="0-3" min="0" max="3" value={s.rir} onChange={e=>setSets(sets.map((x,idx)=>idx===i?{...x,rir:e.target.value}:x))} style={{ padding:"9px 10px" }} />
                      {sets.length>1?<button onClick={()=>setSets(sets.filter((_,idx)=>idx!==i))} style={{ background:"none", border:"none", color:th.textMuted, cursor:"pointer", fontSize:18, padding:0, transition:"color 0.2s" }} onMouseEnter={e=>e.target.style.color=th.accent} onMouseLeave={e=>e.target.style.color=th.textMuted}>×</button>:<span/>}
                    </div>
                  ))}
                  <button onClick={addSet} style={{ background:th.pillBg, border:`1.5px dashed ${th.divider}`, color:th.textMuted, padding:"9px", cursor:"pointer", fontSize:13, fontWeight:500, marginTop:4, width:"100%", borderRadius:12, transition:"all 0.2s", backdropFilter:"blur(8px)", WebkitBackdropFilter:"blur(8px)" }}
                    onMouseEnter={e=>{e.target.style.borderColor=th.accent;e.target.style.color=th.accent;}} onMouseLeave={e=>{e.target.style.borderColor=th.divider;e.target.style.color=th.textMuted;}}>{t.addSet}</button>
                </GlassCard>

                <PrimaryBtn th={th} onClick={handleSave} disabled={loading} style={{ background:savedAnim?th.green:th.accent, boxShadow:savedAnim?`0 4px 16px ${th.greenBg}`:`0 4px 16px ${th.accentGlow}`, opacity:loading?0.7:1, fontSize:16 }}>
                  {loading?t.saving:savedAnim?"✓ "+t.saved:t.save}
                </PrimaryBtn>
              </div>
            )}

            {/* ── GEÇMİŞ ── */}
            {view==="history" && (
              <div>
                {sortedDates.length===0 ? (
                  <div style={{ textAlign:"center", padding:80 }}>
                    <div style={{ fontSize:48, marginBottom:16 }}>🏋️</div>
                    <p style={{ color:th.textMuted, fontSize:14, fontWeight:500 }}>{t.noWorkouts}</p>
                  </div>
                ) : sortedDates.map(d=>{
                  const open = !!expanded[d];
                  return (
                    <div key={d} style={{ marginBottom:10 }}>
                      <button onClick={()=>setExpanded(p=>({...p,[d]:!p[d]}))} className="glass" style={{ width:"100%", background:open?th.glassHeavy:th.glass, border:`1px solid ${open?th.glassHeavyBorder:th.glassBorder}`, boxShadow:th.glassShadow, backdropFilter:"blur(24px)", WebkitBackdropFilter:"blur(24px)", padding:"16px 20px", cursor:"pointer", display:"flex", justifyContent:"space-between", alignItems:"center", borderRadius:open?"18px 18px 0 0":"18px", transition:"all 0.2s", textAlign:"left" }}>
                        <div>
                          <p style={{ color:th.text, fontWeight:600, fontSize:15, marginBottom:2 }}>{formatDate(d,lang)}</p>
                          <p style={{ color:th.textSec, fontSize:12 }}>{byDate[d].length} {t.exercises}</p>
                        </div>
                        <span style={{ color:open?th.accent:th.textMuted, fontSize:22, display:"inline-block", transform:open?"rotate(90deg)":"rotate(0)", transition:"transform 0.25s cubic-bezier(0.34,1.56,0.64,1)" }}>›</span>
                      </button>
                      {open && (
                        <div className="glass" style={{ background:th.glassHeavy, backdropFilter:"blur(24px)", WebkitBackdropFilter:"blur(24px)", border:`1px solid ${th.glassBorder}`, borderTop:"none", borderRadius:"0 0 18px 18px" }}>
                          {byDate[d].map((entry,idx)=>(
                            <div key={entry.id} style={{ padding:"14px 20px", borderTop:idx>0?`1px solid ${th.divider}`:"none", display:"flex", justifyContent:"space-between", alignItems:"flex-start" }}>
                              <div>
                                <p style={{ color:th.text, fontWeight:600, fontSize:14, marginBottom:10 }}>{entry.exercise}</p>
                                <div style={{ display:"flex", flexWrap:"wrap", gap:6 }}>
                                  {entry.sets.map((s,i)=>(
                                    <span key={i} style={{ background:th.tagBg, border:`1px solid ${th.tagBorder}`, padding:"5px 12px", fontSize:13, borderRadius:20, fontWeight:500, backdropFilter:"blur(8px)", WebkitBackdropFilter:"blur(8px)" }}>
                                      <span style={{ color:th.accent, fontWeight:700 }}>{s.weight}</span>
                                      <span style={{ color:th.textMuted }}> kg × </span>
                                      <span style={{ color:th.text }}>{s.reps}</span>
                                      {s.rir!=null&&s.rir!==""&&<span style={{ color:th.textMuted }}> · RIR {s.rir}</span>}
                                    </span>
                                  ))}
                                </div>
                              </div>
                              <button onClick={()=>deleteEntry(entry.id)} style={{ background:"none", border:"none", color:th.textMuted, cursor:"pointer", fontSize:20, padding:"2px 6px", transition:"color 0.2s" }} onMouseEnter={e=>e.target.style.color=th.accent} onMouseLeave={e=>e.target.style.color=th.textMuted}>×</button>
                            </div>
                          ))}
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
            )}

            {/* ── İLERLEME ── */}
            {view==="progress" && (
              <div>
                {allExNames.length===0 ? (
                  <div style={{ textAlign:"center", padding:80 }}>
                    <div style={{ fontSize:48, marginBottom:16 }}>📈</div>
                    <p style={{ color:th.textMuted, fontSize:14, fontWeight:500 }}>{t.noData}</p>
                  </div>
                ) : (
                  <>
                    <GlassCard th={th} style={{ marginBottom:20 }}>
                      <Label th={th}>{t.exercise}</Label>
                      <GlassSelect th={th} value={filterEx} onChange={e=>setFilterEx(e.target.value)} style={{ maxWidth:400 }}>
                        <option value="all">{t.allExercises}</option>
                        {allExNames.map(n=><option key={n} value={n}>{n}</option>)}
                      </GlassSelect>
                    </GlassCard>
                    {filteredProgress.map(({name,bests})=>{
                      const maxB = Math.max(...bests.map(b=>b.best1RM));
                      const latest = bests[bests.length-1]?.best1RM||0;
                      const diff = latest-(bests[0]?.best1RM||0);
                      return (
                        <GlassCard key={name} th={th} style={{ marginBottom:14 }}>
                          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:16 }}>
                            <p style={{ fontWeight:600, fontSize:15, color:th.text }}>{name}</p>
                            {diff>0&&<span style={{ background:th.greenBg, color:th.green, fontSize:12, fontWeight:600, padding:"4px 12px", borderRadius:20 }}>+{diff.toFixed(1)} kg</span>}
                          </div>
                          <div style={{ display:"flex", alignItems:"flex-end", gap:4, height:60, marginBottom:10, background:th.barBg, borderRadius:12, padding:"10px 12px 0", backdropFilter:"blur(8px)", WebkitBackdropFilter:"blur(8px)" }}>
                            {bests.map((b,i)=>(
                              <div key={i} title={`${formatDate(b.date,lang)}: ${b.best1RM.toFixed(1)}kg`} style={{ flex:1, background:i===bests.length-1?th.accent:th.divider, height:`${(b.best1RM/maxB)*100}%`, minHeight:4, borderRadius:"4px 4px 0 0", transition:"height 0.3s", boxShadow:i===bests.length-1?`0 2px 8px ${th.accentGlow}`:"none" }} />
                            ))}
                          </div>
                          <div style={{ display:"flex", gap:24, paddingTop:14, borderTop:`1px solid ${th.divider}` }}>
                            {[[t.bestRM,`${maxB.toFixed(1)} kg`,th.accent],[t.sessions,bests.length,th.text],[t.lastRM,`${latest.toFixed(1)} kg`,th.textSec]].map(([lb,val,col])=>(
                              <div key={lb}>
                                <p style={{ color:th.textMuted, fontSize:10, fontWeight:600, letterSpacing:0.5, textTransform:"uppercase", marginBottom:3 }}>{lb}</p>
                                <p style={{ color:col, fontWeight:700, fontSize:18 }}>{val}</p>
                              </div>
                            ))}
                          </div>
                        </GlassCard>
                      );
                    })}
                  </>
                )}
              </div>
            )}

            {view==="program" && <ProgramView session={session} customExList={customExList} setCustomExList={setCustomExList} userProgram={userProgram} setUserProgram={setUserProgram} th={th} t={t} />}
            {view==="settings" && <SettingsView session={session} themeName={themeName} setThemeName={setThemeName} lang={lang} setLang={setLang} th={th} t={t} />}
          </div>
        </div>
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
